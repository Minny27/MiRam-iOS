name: MiRam
options:
  bundleIdPrefix: com.seungmin
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    TARGETED_DEVICE_FAMILY: "1"

targets:
  MiRam:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: App
      - path: Features
      - path: Routes
      - path: Shared
      - path: SupportingFiles
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.seungmin.miram
        INFOPLIST_FILE: SupportingFiles/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: YES
        LAUNCH_SCREEN_STORYBOARD_NAME: LaunchScreen
    dependencies:
      - sdk: AlarmKit.framework
      - sdk: ActivityKit.framework
      - sdk: UserNotifications.framework
      - sdk: AVFoundation.framework
    info:
      path: SupportingFiles/Info.plist
      properties:
        UIApplicationSceneManifest:
          UIApplicationIsSceneBasedApplication: true
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: "Default Configuration"
                UISceneDelegateClassName: "$(PRODUCT_MODULE_NAME).SceneDelegate"
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        NSUserNotificationsUsageDescription: "알람을 울리기 위해 알림 권한이 필요합니다."
        NSAlarmKitUsageDescription: "MiRam이 백그라운드에서도 정확한 시간에 알람을 예약하도록 허용해 주세요."
        UIBackgroundModes:
          - audio
